agents:
  data_dir: ./data
  compact_threshold: 40
  compact_keep_ratio: 0.25
  compact_chunk_size: 10
  procedure_min_frequency: 3
  memory_max_sections: 50
  context_messages: 12
  health_check_interval_s: 30
  stuck_timeout_s: 0  # 0 = disabled
gemini:
  command: gemini
  args:
  - -y
  workspace_dir: .
  response_timeout_s: 0  # 0 = no per-task timeout
  idle_read_window_s: 0.6
mcp:
  config_dir: ./config/mcp
  default_servers:
  - '*'
chat:
  enabled: true
  space_id: spaces/AAQAuxoTw1w
  space_name: my-space
  poll_interval_s: 2
  debounce_window_ms: 2000
server:
  host: 0.0.0.0
  port: 40000
alerts:
  enabled: false
  chat_space_id: ""
  webhook_url: ""
  email_address: ""
  min_severity: warning
  rate_limit_s: 300
control_plane:
  enabled: true
  queue_depth: 5
  max_tasks: 5000
  tmux_enabled: false
  tmux_session_prefix: g3l
  tmux_idle_ttl_s: 1800
  tmux_max_sessions_per_agent: 2
