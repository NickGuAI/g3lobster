agents:
  data_dir: ./data
  compact_threshold: 40
  compact_keep_ratio: 0.25
  compact_chunk_size: 10
  procedure_min_frequency: 3
  memory_max_sections: 50
  context_messages: 12
  health_check_interval_s: 30
  stuck_timeout_s: 0
gemini:
  command: gemini
  args:
  - -y
  workspace_dir: .
  response_timeout_s: 0
  idle_read_window_s: 0.6
mcp:
  config_dir: ./config/mcp
  default_servers:
  - '*'
chat:
  enabled: true
  space_id: spaces/AAQAkv5tdu8
  space_name: myspace
  poll_interval_s: 2
  concierge_enabled: true
  concierge_agent_id: concierge
  stream_update_interval_s: 1.0
calendar:
  enabled: false
  check_interval_cron: '*/5 * * * *'
server:
  host: 0.0.0.0
  port: 40000
alerts:
  enabled: false
  chat_space_id: ''
  webhook_url: ''
  email_address: ''
  min_severity: warning
  rate_limit_s: 300
auth:
  enabled: false
  api_key: ''
control_plane:
  enabled: true
  queue_depth: 5
  max_tasks: 5000
  tmux_enabled: false
  tmux_session_prefix: g3l
  tmux_idle_ttl_s: 1800
  tmux_max_sessions_per_agent: 2
