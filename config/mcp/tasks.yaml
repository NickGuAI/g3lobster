name: g3lobster-tasks
enabled: true
transport:
  type: stdio
  command: python
  args:
    - -m
    - g3lobster.mcp.tasks_server
description: Unified self-managed task-board MCP tools (create/update/complete/list/delete)
tool_patterns:
  - create_task
  - update_task
  - complete_task
  - list_tasks
  - delete_task
